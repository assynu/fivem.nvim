name: Update native definitions
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * SUN'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
          contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate natives
        run: |
          wget https://github.com/overextended/rage-lua-natives/archive/main.zip -O repo.zip
          unzip repo.zip
          mv rage-lua-natives-main rage-lua-natives
          cd rage-lua-natives
          pnpm i --frozen-lockfile
          pnpm start
          cd ..
          mkdir -p lua/library/natives
          rm -rf lua/library/natives/*
          mv -f rage-lua-natives/build/cfx/{CFX-NATIVE,GTAV,RDR3} lua/library/natives/
          rm -rf rage-lua-natives
          rm repo.zip

      - name: Update repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -am "ci: generate native definitions"
          git push
