name: Update native definitions
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * SUN'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate natives
        run: |
          wget https://github.com/overextended/rage-lua-natives/archive/main.zip -O repo.zip
          unzip repo.zip
          mv rage-lua-natives-main rage-lua-natives
          cd rage-lua-natives
          bun install --frozen-lockfile
          bun run start
          cd ..
          mkdir -p lua/library/natives
          rm -rf lua/library/natives/*
          mv -f rage-lua-natives/build/cfx/{CFX-NATIVE,GTAV,RDR3} lua/library/natives/
          rm -rf rage-lua-natives
          rm repo.zip

      - name: Update repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -am "ci: generate native definitions"
          git push
